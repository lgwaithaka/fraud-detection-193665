# ============================================================
# render.yaml  —  Render.com Deployment Blueprint
# Motor Insurance Fraud Detector | DSA 8502 | 193665
# ============================================================

services:

  # ── Service 1: FastAPI Backend ────────────────────────────────────────────
  - type: web
    name: fraud-api-193665
    runtime: python
    region: oregon
    plan: free

    buildCommand: pip install --upgrade pip && pip install --prefer-binary --only-binary=:all: -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: WEB_CONCURRENCY
        value: 1

    healthCheckPath: /health

  # ── Service 2: Streamlit UI ───────────────────────────────────────────────
  - type: web
    name: fraud-ui-193665
    runtime: python
    region: oregon
    plan: free

    buildCommand: pip install --upgrade pip && pip install --prefer-binary --only-binary=:all: -r requirements.txt
    startCommand: >-
      streamlit run streamlit_app.py
      --server.port $PORT
      --server.address 0.0.0.0
      --server.headless true
      --server.enableCORS false
      --server.enableXsrfProtection false

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: WEB_CONCURRENCY
        value: 1
      - key: API_BASE_URL
        value: https://fraud-api-193665.onrender.com

    healthCheckPath: /_stcore/health
